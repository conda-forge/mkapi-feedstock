schema_version: 1

context:
  name: mkapi
  version: "4.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/mkapi-${{ version }}.tar.gz
  sha256: e60b36ee2e25a0c91a7146b48db6186a95866a441f89eb75c89a4c7318717fd2

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - jinja2
    - mkdocs >=1.6.0
    - omegaconf
    - rich
    - mkdocs-material
    - if: match(python, "<3.11")
      then:
        - tomli >=1.1.0

tests:
  - python:
      imports:
        - mkapi
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  summary: An Auto API Documentation tool.
  license: MIT
  license_file: LICENSE
  homepage: https://daizutabi.github.io/mkapi/

extra:
  recipe-maintainers:
    - hadim
