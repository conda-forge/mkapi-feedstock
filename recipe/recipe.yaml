schema_version: 1

context:
  name: mkapi
  version: "3.0.23"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/mkapi-${{ version }}.tar.gz
  sha256: 375fc4a7f6c8c5f05fa282493c50a5566574213001fd4820117569cd7a3747b1

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python >=3.10
    - pip
    - hatchling
  run:
    - python >=3.10
    - jinja2
    - mkdocs >=1.6.0
    - omegaconf
    - rich
    - mkdocs-material
    - if: match(python, "<3.11")
      then:
        - tomli >=1.1.0

tests:
  - python:
      imports:
        - mkapi
  - requirements:
      run:
        - pip
    script:
      - pip check

about:
  summary: An Auto API Documentation tool.
  license: MIT
  license_file: LICENSE
  homepage: https://daizutabi.github.io/mkapi/

extra:
  recipe-maintainers:
    - hadim
